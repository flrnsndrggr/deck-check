name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Build and push API
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_API_REPO }}
        run: |
          docker build -f apps/api/Dockerfile -t "$REGISTRY/$REPO:${GITHUB_SHA}" .
          docker push "$REGISTRY/$REPO:${GITHUB_SHA}"
      - name: Build and push Web
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_WEB_REPO }}
        run: |
          docker build -t "$REGISTRY/$REPO:${GITHUB_SHA}" apps/web
          docker push "$REGISTRY/$REPO:${GITHUB_SHA}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform init
        working-directory: infra/envs/${{ github.event.inputs.environment || 'staging' }}
        run: terraform init
      - name: Terraform apply
        working-directory: infra/envs/${{ github.event.inputs.environment || 'staging' }}
        run: |
          terraform apply -auto-approve \
            -var="api_image_tag=${{ needs.build-and-push.outputs.image_tag }}" \
            -var="web_image_tag=${{ needs.build-and-push.outputs.image_tag }}"
      - name: Run DB migrations on API task
        run: |
          aws ecs run-task \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --task-definition "${{ secrets.API_MIGRATION_TASK_DEFINITION }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_PRIVATE_SUBNETS }}],securityGroups=[${{ secrets.ECS_TASK_SECURITY_GROUP }}],assignPublicIp=DISABLED}"
