name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/apps/api:${{ github.workspace }}/packages/sim
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API deps
        run: pip install -r apps/api/requirements.txt
      - name: Run API tests
        run: pytest apps/api/tests -q

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
      - name: Build web
        working-directory: apps/web
        run: |
          npm install
          npm run build
