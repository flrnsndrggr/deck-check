services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: commander
      POSTGRES_PASSWORD: commander
      POSTGRES_DB: commander
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://commander:commander@postgres:5432/commander
      REDIS_URL: redis://redis:6379/0
      CARD_CACHE_BACKEND: postgres
      SCRYFALL_BULK_PATH: /tmp/scryfall-oracle-cards.json
      RULES_CACHE_DIR: /tmp/rules
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: python -m app.workers.rq_worker
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://commander:commander@postgres:5432/commander
      REDIS_URL: redis://redis:6379/0
      CARD_CACHE_BACKEND: postgres
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE: ""
    ports:
      - "3000:3000"
    depends_on:
      - api
