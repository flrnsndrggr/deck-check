services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: commander
      POSTGRES_PASSWORD: commander
      POSTGRES_DB: commander
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://commander:commander@postgres:5432/commander
      REDIS_URL: redis://redis:6379/0
      CARD_CACHE_BACKEND: sqlite
      CARD_CACHE_DB: /app/data/cards.db
      SCRYFALL_BULK_PATH: /app/data/scryfall-oracle-cards.json
      RULES_CACHE_DIR: /app/data/rules
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      TRUSTED_HOSTS: localhost,127.0.0.1,api
      FORCE_HTTPS: "0"
      PYTHONPATH: /app:/workspace/packages/sim
    volumes:
      - ./apps/api:/app
      - ./packages/sim:/workspace/packages/sim
      - apidata:/app/data
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: sh -c "sh /app/scripts/migrate.sh && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://commander:commander@postgres:5432/commander
      REDIS_URL: redis://redis:6379/0
      CARD_CACHE_BACKEND: sqlite
      CARD_CACHE_DB: /app/data/cards.db
      SCRYFALL_BULK_PATH: /app/data/scryfall-oracle-cards.json
      RULES_CACHE_DIR: /app/data/rules
      PYTHONPATH: /app:/workspace/packages/sim
    volumes:
      - ./apps/api:/app
      - ./packages/sim:/workspace/packages/sim
      - apidata:/app/data
    depends_on:
      - api
    command: python -m app.workers.rq_worker

  scheduler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://commander:commander@postgres:5432/commander
      REDIS_URL: redis://redis:6379/0
      CARD_CACHE_BACKEND: sqlite
      CARD_CACHE_DB: /app/data/cards.db
      SCRYFALL_BULK_PATH: /app/data/scryfall-oracle-cards.json
      RULES_CACHE_DIR: /app/data/rules
      PYTHONPATH: /app:/workspace/packages/sim
    volumes:
      - ./apps/api:/app
      - ./packages/sim:/workspace/packages/sim
      - apidata:/app/data
    depends_on:
      - api
    command: sh -c "while true; do python /app/scripts/update_data.py --all; sleep 86400; done"

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      NODE_ENV: development
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - ./packages/shared:/workspace/packages/shared
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
  apidata:
