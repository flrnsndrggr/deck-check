services:
  - type: web
    name: deck-check-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    startCommand: sh /app/scripts/start_render.sh
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CARD_CACHE_BACKEND
        value: postgres
      - key: SCRYFALL_BULK_PATH
        value: /tmp/scryfall-oracle-cards.json
      - key: RULES_CACHE_DIR
        value: /tmp/rules
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false
      - key: FORCE_HTTPS
        value: "1"
      - key: AI_ENABLED
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: AI_TIMEOUT_S
        value: "6"
      - key: AI_MAX_OUTPUT_TOKENS
        value: "1200"
      - key: AI_CACHE_TTL_S
        value: "86400"
      - key: AI_HIDE_UNVERIFIABLE
        value: "1"
      - key: AI_DAILY_BUDGET_USD
        value: "2.0"
      - key: AUTH_SESSION_TTL_DAYS
        value: "30"
      - key: AUTH_COOKIE_NAME
        value: dc_session
      - key: AUTH_COOKIE_SECURE
        value: "1"
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_CSRF_HEADER
        value: X-CSRF-Token
      - key: AUTH_CSRF_STORAGE_KEY
        value: deckcheck.csrf
      - key: AUTH_RATE_LIMIT_ATTEMPTS
        value: "10"
      - key: AUTH_RATE_LIMIT_WINDOW_S
        value: "900"
      - key: AUTH_MAGIC_LINK_TTL_MINUTES
        value: "30"
      - key: AUTH_EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: worker
    name: deck-check-worker
    env: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    startCommand: python -m app.workers.rq_worker
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CARD_CACHE_BACKEND
        value: postgres
      - key: SCRYFALL_BULK_PATH
        value: /tmp/scryfall-oracle-cards.json
      - key: RULES_CACHE_DIR
        value: /tmp/rules
      - key: AI_ENABLED
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: AI_TIMEOUT_S
        value: "6"
      - key: AI_MAX_OUTPUT_TOKENS
        value: "1200"
      - key: AI_CACHE_TTL_S
        value: "86400"
      - key: AI_HIDE_UNVERIFIABLE
        value: "1"
      - key: AI_DAILY_BUDGET_USD
        value: "2.0"
      - key: AUTH_SESSION_TTL_DAYS
        value: "30"
      - key: AUTH_COOKIE_NAME
        value: dc_session
      - key: AUTH_COOKIE_SECURE
        value: "1"
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_CSRF_HEADER
        value: X-CSRF-Token
      - key: AUTH_CSRF_STORAGE_KEY
        value: deckcheck.csrf
      - key: AUTH_RATE_LIMIT_ATTEMPTS
        value: "10"
      - key: AUTH_RATE_LIMIT_WINDOW_S
        value: "900"
      - key: AUTH_MAGIC_LINK_TTL_MINUTES
        value: "30"
      - key: AUTH_EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: cron
    name: deck-check-scheduler
    env: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    schedule: "0 3 * * *"
    startCommand: python /app/scripts/update_data.py --all
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CARD_CACHE_BACKEND
        value: postgres
      - key: SCRYFALL_BULK_PATH
        value: /tmp/scryfall-oracle-cards.json
      - key: RULES_CACHE_DIR
        value: /tmp/rules
      - key: AI_ENABLED
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: AI_TIMEOUT_S
        value: "6"
      - key: AI_MAX_OUTPUT_TOKENS
        value: "1200"
      - key: AI_CACHE_TTL_S
        value: "86400"
      - key: AI_HIDE_UNVERIFIABLE
        value: "1"
      - key: AI_DAILY_BUDGET_USD
        value: "2.0"
      - key: AUTH_SESSION_TTL_DAYS
        value: "30"
      - key: AUTH_COOKIE_NAME
        value: dc_session
      - key: AUTH_COOKIE_SECURE
        value: "1"
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_CSRF_HEADER
        value: X-CSRF-Token
      - key: AUTH_CSRF_STORAGE_KEY
        value: deckcheck.csrf
      - key: AUTH_RATE_LIMIT_ATTEMPTS
        value: "10"
      - key: AUTH_RATE_LIMIT_WINDOW_S
        value: "900"
      - key: AUTH_MAGIC_LINK_TTL_MINUTES
        value: "30"
      - key: AUTH_EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
